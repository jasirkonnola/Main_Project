<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – RAG App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .25rem;
      color: #111;
    }

    .subtitle { font-size: .9rem; color: #666; margin-bottom: 1.75rem; }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .35rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: .95rem;
      margin-bottom: 1.1rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: #4f6ef7; }

    .error-list {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1rem;
      font-size: .85rem;
      color: #c0392b;
    }

    button[type="submit"] {
      width: 100%;
      padding: .75rem;
      background: #4f6ef7;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }

    button[type="submit"]:hover { background: #3a56d4; }

    .footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .875rem;
      color: #555;
    }

    .footer a { color: #4f6ef7; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your RAG workspace</p>

    {% if form.errors %}
      <div class="error-list">
        Invalid username or password. Please try again.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />

      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus required />

      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required />

      <button type="submit">Sign In</button>
    </form>

    <p class="footer">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>
  </div>
</body>
</html>
